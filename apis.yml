aid: internal-control-standards
name: Internal Control Standards
description: >-
  Internal Control Standards are frameworks of policies and procedures designed
  to provide reasonable assurance regarding the achievement of objectives in
  operational effectiveness, reliable financial reporting, and compliance with
  laws and regulations. The COSO framework is a widely adopted standard for
  internal controls.
