aid: internal-control-standards
name: Internal Control Standards
description: >-
  Internal Control Standards are frameworks of policies and procedures designed
  to provide reasonable assurance regarding the achievement of objectives in
  operational effectiveness, reliable financial reporting, and compliance with
  laws and regulations. The COSO Internal Control - Integrated Framework
  (originally released in 1992 and refreshed as ICIF-2013) is the most widely
  adopted standard for internal controls and underpins SOX 404 compliance, with
  supplemental 2023 guidance for internal control over sustainability reporting
  (ICSR) addressing modern risks including generative AI and robotic process
  automation.
